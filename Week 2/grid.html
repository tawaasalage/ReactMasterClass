<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      * {
        padding: 0px;
        margin: 0px;
      }
      .container {
        background-color: wheat;
        height: 100vh;
        width: 100vw;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 2fr 2fr;
        grid-template-rows: 1fr 3fr 1fr;
        grid-template-areas: "header header header" "sidebar content content" "footer footer footer";
      }

      .grid {
        background-color: cornflowerblue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="grid" style="grid-area: header">Screen 1</div>
      <div class="grid" style="grid-area: sidebar">Screen 2</div>
      <div class="grid" style="grid-area: content">Screen 3</div>
      <div class="grid" style="grid-area: footer">Screen 4</div>
    </div>
  </body>
</html>
