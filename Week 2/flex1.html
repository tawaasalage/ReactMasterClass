<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Box</title>
    <style>
      .container {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 10px;
      }
      .row {
        width: 300px;
        height: 300px;
        background-color: cadetblue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row" style="flex: 1; order: 2">A</div>
      <div class="row" style="flex: 4; order: 1">B</div>
      <div class="row" style="flex: 1; order: 3">C</div>
    </div>
  </body>
</html>
