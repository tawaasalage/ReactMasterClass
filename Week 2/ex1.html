<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <style>
      .container {
        width: 300px;
        height: 300px;
        background-color: rgb(255, 256, 43);
        margin: 10px;
        padding: 5px;
        border: 1px solid black;
        box-sizing: border-box;
      }

      h1 {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      p {
        font-weight: bold;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>This is a header</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Fuga nobis
        incidunt illo quae vel provident corrupti porro ipsa, laboriosam veniam
        non voluptatibus, fugiat itaque hic! Ipsa repellat dolores nesciunt?
        Necessitatibus.
      </p>
    </div>
  </body>
</html>
